<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园旧书好物交易平台</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { max-width: 960px; margin: 20px auto; padding: 0 20px; }
        .title-box { border: 2px solid #333; text-align: center; font-size: 36px; padding: 20px; margin-bottom: 25px; background: #f8f9fa; border-radius: 8px; }
        .search-bar { display: flex; gap: 0; margin-bottom: 35px; }
        #search-input { flex: 1; font-size: 24px; padding: 10px 16px; border: 2px solid #333; border-right: none; border-radius: 8px 0 0 8px; outline: none; }
        #search-input:focus { border-color: #407bff; }
        #search-btn { font-size: 24px; padding: 10px 28px; border: 2px solid #333; background: #407bff; color: #fff; cursor: pointer; border-radius: 0 8px 8px 0; transition: background 0.2s; }
        #search-btn:hover { background: #2563eb; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .recommend-title { font-size: 28px; font-weight: bold; }
        .section-more { font-size: 16px; color: #407bff; cursor: pointer; }
        .section-more:hover { text-decoration: underline; }
        .goods-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .goods-card { border: 2px solid #333; border-radius: 10px; padding: 18px; text-align: center; transition: all 0.3s; cursor: pointer; background: #fff; }
        .goods-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.10); }
        .goods-name { font-size: 28px; font-weight: 600; margin-bottom: 10px; }
        .goods-type { font-size: 14px; color: #407bff; margin-bottom: 4px; }
        .goods-category { font-size: 14px; color: #888; margin-bottom: 8px; }
        .img-area { height: 180px; border: 2px solid #333; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 72px; background: #fafbfc; overflow: hidden; }
        .img-area img { width: 100%; height: 100%; object-fit: cover; }
        .goods-footer { display: flex; justify-content: space-between; font-size: 16px; color: #666; }
        .want-text { color: #407bff; font-weight: 500; }
        .nav-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .nav-item { border: 2px solid #333; border-radius: 8px; text-align: center; font-size: 24px; padding: 16px; cursor: pointer; transition: all 0.2s; background: #fff; position: relative; }
        .nav-item:hover { background: #e8f0ff; border-color: #407bff; transform: scale(1.02); }
        .nav-item .icon { font-size: 32px; display: block; margin-bottom: 4px; }
        .nav-item .label { font-size: 16px; }
        .empty-tip { text-align: center; padding: 60px 20px; color: #999; font-size: 18px; grid-column: 1 / -1; }
        .user-greeting { font-size: 16px; color: #666; margin-bottom: 10px; text-align: right; }
        .user-greeting span { color: #407bff; font-weight: 600; }
        @media (max-width: 600px) {
            .goods-grid { grid-template-columns: 1fr; }
            .nav-bar { grid-template-columns: 1fr 1fr; }
            .title-box { font-size: 24px; padding: 14px; }
            #search-input { font-size: 18px; }
            #search-btn { font-size: 18px; padding: 10px 18px; }
        }
    </style>
</head>
<body>
    <div class="title-box">🏫 校园旧书好物交易平台</div>
    <div class="user-greeting" id="greeting">👋 你好，<span id="userName">同学</span></div>
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="🔍 输入要查询的物品...">
        <button id="search-btn">搜索</button>
    </div>
    <div class="section-header">
        <div class="recommend-title">🔥 热门推荐</div>
        <span class="section-more" onclick="location.href='buy.html'">查看全部 →</span>
    </div>
    <div class="goods-grid" id="goodsContainer">
        <div class="empty-tip">⏳ 加载中...</div>
    </div>
    <div class="nav-bar">
        <div class="nav-item" onclick="location.href='buy.html'">
            <span class="icon">🛒</span>
            <span class="label">物品广场</span>
        </div>
        <div class="nav-item" onclick="location.href='myManage.html'">
            <span class="icon">📋</span>
            <span class="label">我的管理</span>
        </div>
        <div class="nav-item" onclick="location.href='chatList.html'">
            <span class="icon">💬</span>
            <span class="label">消息</span>
        </div>
        <div class="nav-item" onclick="location.href='setting.html'">
            <span class="icon">⚙️</span>
            <span class="label">个人设置</span>
        </div>
    </div>

    <script>
        const ENV_ID = 'campus-trading-d9g84nflw71c77ac3';
        const app = cloudbase.init({ env: ENV_ID });
        const db = app.database();
        const auth = app.auth();

        let myUserId = '';
        let userName = '同学';

        // ===== 获取图片临时链接 =====
        async function getImageUrl(fileID) {
            if (!fileID) return null;
            if (!fileID.startsWith('cloud://')) return fileID; // 已为URL或emoji
            try {
                const result = await app.getTempFileURL({ fileList: [fileID] });
                return result.fileList[0].tempFileURL;
            } catch (e) {
                console.error('获取图片链接失败:', e);
                return null;
            }
        }

        // ===== 加载物品 =====
        async function loadItems() {
            try {
                const [wantedRes, saleRes] = await Promise.all([
                    db.collection('wanted').where({ isFinish: false, status: 'approved' }).orderBy('createdAt', 'desc').limit(6).get(),
                    db.collection('sales').where({ isFinish: false, status: 'approved' }).orderBy('createdAt', 'desc').limit(6).get()
                ]);
                let items = [...(wantedRes.data || []), ...(saleRes.data || [])];
                // 按时间排序
                items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                // 取前4条
                items = items.slice(0, 4);
                
                // 处理图片：将 cloud:// 转换为临时 URL
                const processedItems = await Promise.all(items.map(async (item) => {
                    if (item.img && item.img.startsWith('cloud://')) {
                        const url = await getImageUrl(item.img);
                        item.imgUrl = url || '📦';
                    } else {
                        item.imgUrl = item.img || '📦';
                    }
                    return item;
                }));

                renderItems(processedItems);
            } catch (e) {
                console.error('加载物品失败', e);
                renderItems([]);
            }
        }

        // ===== 渲染物品列表 =====
        function renderItems(list) {
            const container = document.getElementById('goodsContainer');
            if (!list || list.length === 0) {
                container.innerHTML = '<div class="empty-tip">📦 暂无物品，去发布第一条吧！</div>';
                return;
            }
            let html = '';
            for (let item of list) {
                const typeLabel = item.type === 'sale' ? '🛒 出售' : '📢 求购';
                const categoryMap = { 'book': '📚', 'digital': '💻', 'daily': '🧴', 'sports': '⚽', 'other': '🎯' };
                const catIcon = categoryMap[item.category] || '📦';
                const price = item.type === 'sale' ? `💰 ${item.price || '面议'}` : `💰 ${item.budget || '面议'}`;

                // 图片显示：优先使用 imgUrl，否则用 img
                let imgHtml = '';
                const imgSrc = item.imgUrl || item.img || '📦';
                if (imgSrc === '📦') {
                    imgHtml = '📦';
                } else {
                    imgHtml = `<img src="${imgSrc}" alt="图片">`;
                }

                html += `
                    <div class="goods-card" onclick="location.href='detail.html?id=${item._id}&type=${item.type || 'wanted'}'">
                        <div class="goods-type">${typeLabel}</div>
                        <div class="goods-category">${catIcon} ${item.category || '其他'}</div>
                        <div class="goods-name">${escapeHtml(item.name || '未命名')}</div>
                        <div class="img-area">${imgHtml}</div>
                        <div class="goods-footer">
                            <span>${price}</span>
                            <span class="want-text">👤 ${escapeHtml(item.userDisplay || '匿名')}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== 初始化登录 =====
        async function initAuth() {
            try {
                const loginState = await auth.getLoginState();
                if (loginState) {
                    myUserId = loginState.user.uid;
                } else {
                    const res = await auth.signInAnonymously();
                    myUserId = res.user.uid;
                }
                const nick = localStorage.getItem('userNick');
                if (nick) {
                    userName = nick;
                } else {
                    userName = '用户_' + myUserId.substring(0, 6);
                    localStorage.setItem('userNick', userName);
                }
                document.getElementById('userName').textContent = userName;
                loadItems();
            } catch (err) {
                console.error('登录失败', err);
                myUserId = localStorage.getItem('currentUserId') || 'anonymous_' + Date.now();
                userName = localStorage.getItem('userNick') || '同学';
                document.getElementById('userName').textContent = userName;
                loadItems();
            }
        }

        // ===== 搜索 =====
        document.getElementById('search-btn').addEventListener('click', function() {
            const keyword = document.getElementById('search-input').value.trim();
            if (!keyword) { alert('请输入搜索关键词'); return; }
            location.href = `buy.html?search=${encodeURIComponent(keyword)}`;
        });
        document.getElementById('search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('search-btn').click();
        });

        initAuth();
    </script>
</body>
</html>
