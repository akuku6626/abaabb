<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录注册 - 校园旧书好物交易交换平台</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(120deg, #66a3ff, #407bff);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
        }
        .main-title {
            color: #fff;
            font-size: 28px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .login-box {
            width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .tab-bar {
            display: flex;
        }
        .tab-bar div {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 18px;
            cursor: pointer;
            background: #f7f9fc;
            color: #3d4a5c;
            font-weight: 500;
            transition: 0.15s;
        }
        .tab-bar div.active {
            background: #fff;
            color: #407bff;
            font-weight: bold;
            border-bottom: 3px solid #407bff;
        }
        .form-wrap {
            padding: 30px;
        }
        .input-item {
            margin-bottom: 20px;
        }
        .input-item input {
            width: 100%;
            height: 46px;
            padding: 0 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
            background: #fafcff;
        }
        .input-item input:focus {
            border-color: #407bff;
            box-shadow: 0 0 0 3px rgba(64, 123, 255, 0.12);
            outline: none;
        }
        .submit-btn {
            width: 100%;
            height: 48px;
            background: #407bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .submit-btn:hover {
            background: #2563eb;
        }
        .register-form {
            display: none;
        }
        .error-msg {
            color: #e74c5e;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .success-msg {
            color: #22a67e;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .loading-msg {
            color: #407bff;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        /* 管理员注册入口 - 右下角 */
        .admin-register-link {
            position: relative;
            display: inline-block;
            margin-top: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: color 0.2s;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .admin-register-link:hover {
            color: #fff;
        }

        /* 管理员注册模态框 */
        .admin-modal-mask {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .admin-modal {
            background: #fff;
            border-radius: 16px;
            padding: 32px 36px 28px;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: popIn 0.25s ease;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .admin-modal h2 {
            font-size: 22px;
            margin-bottom: 4px;
            color: #1a2634;
        }
        .admin-modal .sub {
            font-size: 14px;
            color: #8895aa;
            margin-bottom: 16px;
        }
        .admin-modal .input-item {
            margin-bottom: 14px;
        }
        .admin-modal .input-item input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d0d6de;
            border-radius: 8px;
            font-size: 15px;
            background: #fafcff;
        }
        .admin-modal .input-item input:focus {
            border-color: #407bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(64, 123, 255, 0.12);
        }
        .admin-modal .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            justify-content: flex-end;
        }
        .admin-modal .btn-row button {
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: 0.15s;
        }
        .admin-modal .btn-row .btn-cancel {
            background: #f5f5f5;
            color: #3d4a5c;
        }
        .admin-modal .btn-row .btn-cancel:hover {
            background: #eee;
        }
        .admin-modal .btn-row .btn-submit {
            background: #407bff;
            color: #fff;
        }
        .admin-modal .btn-row .btn-submit:hover {
            background: #2563eb;
        }
        .admin-modal .error-tip {
            color: #e74c5e;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">📚 校园旧书好物交易平台</h1>
        <div class="login-box">
            <div class="tab-bar">
                <div class="active" onclick="switchTab('login')">账号登录</div>
                <div onclick="switchTab('register')">新用户注册</div>
            </div>
            <div class="form-wrap">
                <!-- 登录 -->
                <div class="login-form">
                    <div class="input-item"><input type="text" id="loginUsername" placeholder="学号/账号"></div>
                    <div class="input-item"><input type="password" id="loginPassword" placeholder="登录密码"></div>
                    <div id="loginError" class="error-msg"></div>
                    <button class="submit-btn" id="loginBtn">立即登录</button>
                </div>
                <!-- 注册 -->
                <div class="register-form">
                    <div class="input-item"><input type="text" id="regUsername" placeholder="设置账号（学号）"></div>
                    <div class="input-item"><input type="text" id="regRealName" placeholder="真实姓名"></div>
                    <div class="input-item"><input type="password" id="regPassword" placeholder="设置密码"></div>
                    <div id="regError" class="error-msg"></div>
                    <div id="regSuccess" class="success-msg"></div>
                    <div id="regLoading" class="loading-msg">处理中...</div>
                    <button class="submit-btn" id="registerBtn">完成注册</button>
                </div>
            </div>
        </div>
        <!-- 管理员注册入口（右下角） -->
        <div class="admin-register-link" id="adminRegisterLink">🔑 管理员注册</div>
    </div>

    <!-- 管理员注册模态框 -->
    <div class="admin-modal-mask" id="adminModal">
        <div class="admin-modal">
            <h2>🔐 管理员注册</h2>
            <div class="sub">请输入管理员信息，需验证管理员密钥</div>
            <div class="input-item"><input type="text" id="adminUsername" placeholder="管理员账号（学号）"></div>
            <div class="input-item"><input type="text" id="adminRealName" placeholder="真实姓名"></div>
            <div class="input-item"><input type="password" id="adminPassword" placeholder="登录密码（至少4位）"></div>
            <div class="input-item"><input type="password" id="adminKey" placeholder="管理员密钥（需输入正确密钥）"></div>
            <div id="adminError" class="error-tip"></div>
            <div class="btn-row">
                <button class="btn-cancel" id="adminCancel">取消</button>
                <button class="btn-submit" id="adminSubmit">注册管理员</button>
            </div>
        </div>
    </div>

    <script>
        const ENV_ID = 'campus-trading-d9g84nflw71c77ac3';
        const app = cloudbase.init({ env: ENV_ID, region: 'ap-shanghai' });
        const db = app.database();
        const auth = app.auth();

        // ===== 匿名登录（用于数据库操作权限） =====
        auth.signInAnonymously().then(() => {
            console.log('✅ 匿名登录成功');
        }).catch(err => {
            console.error('❌ 匿名登录失败', err);
        });

        // ===== 切换登录/注册 =====
        function switchTab(type) {
            const loginForm = document.querySelector('.login-form');
            const regForm = document.querySelector('.register-form');
            const tabs = document.querySelectorAll('.tab-bar div');
            if (type === 'login') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('regError').style.display = 'none';
            document.getElementById('regSuccess').style.display = 'none';
            document.getElementById('regLoading').style.display = 'none';
        }

        // ============================================================
        // ===== 登录 =====
        // ============================================================
        document.getElementById('loginBtn').onclick = async function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');

            if (!username || !password) {
                errorEl.textContent = '请填写完整账号和密码';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await db.collection('user').where({ username, password }).get();

                if (res.data.length > 0) {
                    const user = res.data[0];

                    // ===== 检查用户是否被封禁 =====
                    if (user.status === 'banned') {
                        errorEl.textContent = '账号已被封禁，请联系管理员';
                        errorEl.style.display = 'block';
                        return;
                    }

                    // ===== 清除旧用户数据（彻底隔离） =====
                    localStorage.removeItem('currentUserId');
                    localStorage.removeItem('currentUser');
                    localStorage.removeItem('userNick');
                    localStorage.removeItem('userAvatar');
                    localStorage.removeItem('userPhone');
                    localStorage.removeItem('userAuth');
                    localStorage.removeItem('lastUserId');

                    // ===== 写入新用户数据 =====
                    localStorage.setItem('currentUserId', user._id);
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    localStorage.setItem('userNick', user.realName || user.username || '用户');
                    localStorage.setItem('lastUserId', user._id);

                    // ===== 根据角色跳转 =====
                    if (user.role === 'admin') {
                        location.href = 'adminDashboard.html';
                    } else {
                        location.href = 'index.html';
                    }
                } else {
                    errorEl.textContent = '账号或密码错误，请重试';
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.textContent = '登录失败：' + (e.message || '未知错误');
                errorEl.style.display = 'block';
                console.error('登录异常', e);
            }
        };

        // ============================================================
        // ===== 注册 =====
        // ============================================================
        document.getElementById('registerBtn').onclick = async function() {
            const username = document.getElementById('regUsername').value.trim();
            const realName = document.getElementById('regRealName').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const errorEl = document.getElementById('regError');
            const successEl = document.getElementById('regSuccess');
            const loadingEl = document.getElementById('regLoading');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            loadingEl.style.display = 'none';

            // ===== 基本校验 =====
            if (!username || !realName || !password) {
                errorEl.textContent = '请填写完整信息（账号、姓名、密码）';
                errorEl.style.display = 'block';
                return;
            }
            if (username.length < 3) {
                errorEl.textContent = '账号长度至少3位';
                errorEl.style.display = 'block';
                return;
            }
            if (password.length < 4) {
                errorEl.textContent = '密码长度至少4位';
                errorEl.style.display = 'block';
                return;
            }

            loadingEl.style.display = 'block';

            try {
                // ===== 检查账号是否已存在 =====
                const check = await db.collection('user').where({ username }).get();
                if (check.data.length > 0) {
                    errorEl.textContent = '该账号已被注册，请换一个';
                    errorEl.style.display = 'block';
                    loadingEl.style.display = 'none';
                    return;
                }

                // ===== 新增用户 =====
                const addRes = await db.collection('user').add({
                    username,
                    realName,
                    password,
                    role: 'user',
                    status: 'active'
                });
                const newUserId = addRes.id;
                const newUser = {
                    _id: newUserId,
                    username,
                    realName,
                    password,
                    role: 'user',
                    status: 'active'
                };

                // ===== 清除旧缓存，写入新数据 =====
                localStorage.removeItem('currentUserId');
                localStorage.removeItem('currentUser');
                localStorage.removeItem('userNick');
                localStorage.removeItem('userAvatar');
                localStorage.removeItem('userPhone');
                localStorage.removeItem('userAuth');
                localStorage.removeItem('lastUserId');

                localStorage.setItem('currentUserId', newUserId);
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                localStorage.setItem('userNick', realName || username || '用户');
                localStorage.setItem('lastUserId', newUserId);

                loadingEl.style.display = 'none';
                // ===== 注册成功，直接跳转首页 =====
                location.href = 'index.html';
            } catch (e) {
                loadingEl.style.display = 'none';
                let errMsg = e.message || '未知错误';
                if (e.code === 'DATABASE_REQUEST_FAILED') {
                    errMsg += '。请检查数据库集合 "user" 是否存在，且权限为"所有用户可读写"';
                } else if (e.code === 'PERMISSION_DENIED') {
                    errMsg += '。权限不足，请到控制台将 "user" 集合权限设为"所有用户可读写"';
                }
                errorEl.textContent = '注册失败：' + errMsg;
                errorEl.style.display = 'block';
                console.error('注册异常详情', e);
            }
        };

        // ============================================================
        // ===== 管理员注册弹窗 =====
        // ============================================================
        const adminModal = document.getElementById('adminModal');
        const adminRegisterLink = document.getElementById('adminRegisterLink');
        const adminCancel = document.getElementById('adminCancel');
        const adminSubmit = document.getElementById('adminSubmit');
        const ADMIN_KEY = 'admin123'; // 预设管理员密钥

        adminRegisterLink.onclick = function() {
            adminModal.style.display = 'flex';
            document.getElementById('adminError').style.display = 'none';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminRealName').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminKey').value = '';
        };

        adminCancel.onclick = function() {
            adminModal.style.display = 'none';
        };

        adminModal.onclick = function(e) {
            if (e.target === adminModal) adminModal.style.display = 'none';
        };

        adminSubmit.onclick = async function() {
            const username = document.getElementById('adminUsername').value.trim();
            const realName = document.getElementById('adminRealName').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            const key = document.getElementById('adminKey').value.trim();
            const errorEl = document.getElementById('adminError');
            errorEl.style.display = 'none';

            if (!username || !realName || !password || !key) {
                errorEl.textContent = '请填写所有字段';
                errorEl.style.display = 'block';
                return;
            }
            if (username.length < 3) {
                errorEl.textContent = '账号至少3位';
                errorEl.style.display = 'block';
                return;
            }
            if (password.length < 4) {
                errorEl.textContent = '密码至少4位';
                errorEl.style.display = 'block';
                return;
            }
            if (key !== ADMIN_KEY) {
                errorEl.textContent = '❌ 管理员密钥错误，请核对';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const check = await db.collection('user').where({ username }).get();
                if (check.data.length > 0) {
                    errorEl.textContent = '该账号已被占用';
                    errorEl.style.display = 'block';
                    return;
                }
                await db.collection('user').add({
                    username,
                    realName,
                    password,
                    role: 'admin',
                    status: 'active'
                });
                alert('✅ 管理员注册成功！请使用账号密码登录');
                adminModal.style.display = 'none';
            } catch (e) {
                errorEl.textContent = '注册失败：' + e.message;
                errorEl.style.display = 'block';
                console.error(e);
            }
        };
    </script>
</body>
</html>
