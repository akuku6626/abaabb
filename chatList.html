<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>消息列表 - 校园旧书好物交易平台</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { max-width: 960px; margin: 20px auto; padding: 0 20px; }
        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #333; }
        .page-title { font-size: 36px; font-weight: bold; }
        .customer-btn { border: 2px solid #333; font-size: 20px; padding: 10px 28px; background: #fff; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .customer-btn:hover { background: #f0f0f0; transform: scale(1.02); }
        .msg-item { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; cursor: pointer; padding: 14px 18px; border-radius: 10px; border: 1px solid #eee; transition: all 0.2s; position: relative; }
        .msg-item:hover { background: #f0f4ff; border-color: #407bff; transform: translateX(4px); }
        .avatar-box { width: 70px; height: 70px; border: 2px solid #333; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #f5f7fa; }
        .msg-info { flex: 1; }
        .msg-name { font-size: 22px; font-weight: 600; }
        .msg-preview { font-size: 16px; color: #888; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
        .msg-time { font-size: 14px; color: #bbb; }
        .official-badge { background: #407bff; color: #fff; font-size: 12px; padding: 2px 12px; border-radius: 12px; margin-left: 10px; }
        .empty-tip { text-align: center; padding: 80px 20px; color: #999; font-size: 18px; }
        .empty-tip .big-icon { font-size: 64px; display: block; margin-bottom: 16px; }
        .bottom-bar { display: flex; justify-content: center; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .bottom-bar button { padding: 10px 30px; font-size: 18px; border: 1px solid #333; background: #fff; cursor: pointer; border-radius: 6px; }
        .bottom-bar button:hover { background: #f0f0f0; }
        .refresh-btn { background: #f0f0f0; border: 1px solid #ccc; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .refresh-btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="header-wrap">
        <div class="page-title">💬 消息</div>
        <div>
            <button class="refresh-btn" id="manualRefreshBtn">🔄 刷新</button>
            <button class="customer-btn" id="customerServiceBtn">🎧 人工客服</button>
        </div>
    </div>
    <div class="msg-item" onclick="openChat('official', '官方消息通知')">
        <div class="avatar-box">📢</div>
        <div class="msg-info">
            <div class="msg-name">官方消息通知 <span class="official-badge">官方</span></div>
            <div class="msg-preview">欢迎来到校园交易平台，查看最新公告</div>
        </div>
        <div class="msg-time">最新</div>
    </div>
    <div id="conversationList"></div>
    <div class="bottom-bar">
        <button onclick="location.href='index.html'">🏠 返回主界面</button>
        <button onclick="location.href='buy.html'">📢 去求购广场</button>
    </div>

    <script>
        const ENV_ID = 'campus-trading-d9g84nflw71c77ac3';
        const app = cloudbase.init({ env: ENV_ID });
        const db = app.database();
        const _ = db.command;
        const auth = app.auth();

        let myUserId = "";
        let myRegisteredId = "";

        async function login() {
            myRegisteredId = localStorage.getItem('currentUserId');
            if (!myRegisteredId) {
                alert('👋 请先登录');
                location.href = 'login.html';
                return;
            }
            myUserId = myRegisteredId;
            if (!localStorage.getItem('userNick')) {
                localStorage.setItem('userNick', '用户_' + myUserId.substring(0, 6));
            }
            loadConversationList();
        }

        async function loadConversationList() {
            const wrap = document.getElementById("conversationList");
            try {
                const { data } = await db.collection("conversations")
                    .where(_.or([{ userIdA: myUserId }, { userIdB: myUserId }]))
                    .orderBy('updatedAt', 'desc')
                    .get();

                if (!data || data.length === 0) {
                    wrap.innerHTML = `<div class="empty-tip"><span class="big-icon">💭</span>暂无聊天会话<br><span style="font-size:14px;color:#bbb;">去求购广场联系卖家开始聊天吧</span></div>`;
                    return;
                }

                let html = "";
                for (let item of data) {
                    const targetName = item.userIdA === myUserId ? item.nameB : item.nameA;
                    const targetId = item.userIdA === myUserId ? item.userIdB : item.userIdA;

                    let lastMsg = '点击开始聊天';
                    try {
                        const msgRes = await db.collection("message")
                            .where({ conversationId: item._id })
                            .orderBy("createdAt", "desc")
                            .limit(1)
                            .get();
                        if (msgRes.data && msgRes.data.length > 0) {
                            let content = msgRes.data[0].content;
                            // 如果是支付消息，解析显示商品名
                            if (msgRes.data[0].msgType === 'payment') {
                                try {
                                    const payData = JSON.parse(content);
                                    content = `💰 收款：${payData.productName} ${payData.status === 'paid' ? '(已支付)' : '(待支付)'}`;
                                } catch(e) {}
                            }
                            lastMsg = content;
                            if (lastMsg.length > 30) lastMsg = lastMsg.substring(0, 30) + '...';
                        }
                    } catch (e) {}

                    html += `
                        <div class="msg-item" onclick="openChat('${item._id}', '${targetName.replace(/'/g, "\\'")}', '${targetId}')">
                            <div class="avatar-box">👤</div>
                            <div class="msg-info">
                                <div class="msg-name">${targetName}</div>
                                <div class="msg-preview">${lastMsg}</div>
                            </div>
                            <div class="msg-time">${item.updatedAt ? new Date(item.updatedAt).toLocaleDateString() : '近期'}</div>
                        </div>
                    `;
                }
                wrap.innerHTML = html;
            } catch (e) {
                console.error('加载会话列表失败', e);
                wrap.innerHTML = `<div class="empty-tip"><span class="big-icon">⚠️</span>加载失败，请刷新重试</div>`;
            }
        }

        function openChat(conversationId, targetName, targetId) {
            location.href = `chatRoom.html?cid=${conversationId}&name=${encodeURIComponent(targetName)}&targetId=${encodeURIComponent(targetId || '')}`;
        }

        document.getElementById("manualRefreshBtn").onclick = function() {
            loadConversationList();
            showToast('🔄 刷新成功', 1500);
        };

        function showToast(msg, duration=2500) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 28px;border-radius:10px;font-size:16px;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:opacity 0.4s;opacity:0;pointer-events:none;';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '1'; }, 50);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, duration);
        }

        document.getElementById("customerServiceBtn").onclick = () => {
            alert("🎧 客服功能开发中\n如有紧急问题请联系：service@campus-trade.com");
        };

        // 页面可见时刷新
        function refreshIfNeeded() {
            if (myRegisteredId) {
                loadConversationList();
            }
        }
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) refreshIfNeeded();
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) refreshIfNeeded();
        });
        // 轮询（每15秒）
        setInterval(() => {
            if (!document.hidden) refreshIfNeeded();
        }, 15000);

        login();
    </script>
</body>
</html>
