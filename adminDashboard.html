<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理后台 - 校园旧书好物交易平台</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
    <style>
        /* ===== 全局样式（与其他管理页面一致） ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei","PingFang SC",sans-serif; }
        body { background:#f5f7fb; display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:220px; min-width:220px; background:#fff; border-right:1px solid #e8ecf2; height:100vh; display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
        .sidebar-brand { padding:20px 24px 14px; border-bottom:1px solid #eef1f5; font-size:20px; font-weight:700; color:#1a2634; display:flex; align-items:center; gap:8px; }
        .sidebar-brand span { font-size:26px; }
        .sidebar-menu { padding:12px 0; flex:1; }
        .menu-item { display:flex; align-items:center; padding:12px 24px; cursor:pointer; color:#3d4a5c; font-size:15px; transition:0.15s; border-left:3px solid transparent; gap:12px; text-decoration:none; }
        .menu-item:hover { background:#f0f4fe; color:#1a2634; }
        .menu-item.active { background:#eef4ff; color:#407bff; border-left-color:#407bff; font-weight:500; }
        .menu-item .icon { font-size:18px; width:24px; text-align:center; }
        .admin-info { padding:16px 24px; border-top:1px solid #eef1f5; display:flex; align-items:center; gap:12px; }
        .admin-avatar { width:36px; height:36px; border-radius:50%; background:#407bff; color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; }
        .admin-name { font-size:14px; font-weight:600; color:#1a2634; }
        .admin-role { font-size:12px; color:#8895aa; }
        .logout-btn { margin:0 12px 16px; padding:8px 16px; background:#e74c5e; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:14px; transition:0.15s; text-align:center; }
        .logout-btn:hover { background:#c0392b; }

        .main-content { flex:1; padding:24px 32px 40px; overflow-y:auto; }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .page-header h1 { font-size:26px; font-weight:700; color:#1a2634; }

        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:16px; margin-bottom:28px; }
        .stat-card { background:#fff; border-radius:12px; padding:18px 20px 16px; border:1px solid #e8ecf2; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
        .stat-card .label { font-size:13px; color:#8895aa; font-weight:500; }
        .stat-card .number { font-size:28px; font-weight:700; color:#1a2634; margin-top:4px; }

        .dashboard-chart { background:#fafcff; border-radius:12px; border:1px solid #e8ecf2; padding:20px; margin-bottom:20px; }
        .dashboard-chart h3 { font-size:16px; font-weight:600; margin-bottom:12px; }
        .trend-bars { display:flex; gap:12px; justify-content:space-around; align-items:flex-end; height:120px; }
        .trend-bar { display:flex; flex-direction:column; align-items:center; flex:1; }
        .trend-bar .bar { width:100%; max-width:40px; background:#407bff; border-radius:4px 4px 0 0; transition:height 0.3s; min-height:4px; }
        .trend-bar .bar-label { font-size:12px; color:#8895aa; margin-top:6px; }

        .recent-activity { background:#fafcff; border-radius:12px; border:1px solid #e8ecf2; padding:16px 20px; }
        .recent-activity .activity-item { padding:6px 0; border-bottom:1px solid #f0f2f6; color:#3d4a5c; font-size:14px; }
        .recent-activity .activity-item:last-child { border-bottom:none; }
        .recent-activity .time { color:#8895aa; font-size:12px; margin-left:12px; }

        .btn-secondary { padding:6px 16px; border:1px solid #d0d6de; background:#fff; border-radius:6px; cursor:pointer; font-size:14px; }
        .btn-secondary:hover { background:#f0f4fe; }

        .toast { position:fixed; top:30px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 28px; border-radius:10px; font-size:15px; z-index:1000; opacity:0; transition:opacity 0.4s; pointer-events:none; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
        .toast.show { opacity:1; }

        @media (max-width:768px) {
            .sidebar { width:60px; min-width:60px; }
            .sidebar-brand span:last-child, .menu-item .label, .admin-info .admin-name, .admin-info .admin-role { display:none; }
            .sidebar-brand { justify-content:center; padding:16px 0; }
            .menu-item { padding:12px 0; justify-content:center; }
            .admin-info { justify-content:center; }
            .main-content { padding:16px; }
            .stats-grid { grid-template-columns:1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-brand"><span>📚</span><span>管理后台</span></div>
        <div class="sidebar-menu">
            <a class="menu-item active" href="adminDashboard.html"><span class="icon">📊</span><span class="label">数据概览</span></a>
            <a class="menu-item" href="adminWanted.html"><span class="icon">📦</span><span class="label">求购贴管理</span></a>
            <a class="menu-item" href="adminSale.html"><span class="icon">🛒</span><span class="label">出售贴管理</span></a>
            <a class="menu-item" href="adminComment.html"><span class="icon">💬</span><span class="label">留言审核</span></a>
            <a class="menu-item" href="adminUsers.html"><span class="icon">👥</span><span class="label">用户管理</span></a>
            <a class="menu-item" href="adminReports.html"><span class="icon">🚫</span><span class="label">举报管理</span></a>
        </div>
        <div class="admin-info">
            <div class="admin-avatar" id="adminAvatar">管</div>
            <div>
                <div class="admin-name" id="adminName">管理员</div>
                <div class="admin-role">超级管理员</div>
            </div>
        </div>
        <button class="logout-btn" onclick="logoutAdmin()">🚪 退出管理</button>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="page-header">
            <h1>📊 数据概览</h1>
            <button class="btn-secondary" onclick="loadDashboard()">🔄 刷新</button>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="label">👥 用户总数</div><div class="number" id="statUserTotal">0</div></div>
            <div class="stat-card"><div class="label">📦 求购贴总数</div><div class="number" id="statWantedTotal">0</div></div>
            <div class="stat-card"><div class="label">🛒 出售贴总数</div><div class="number" id="statSaleTotal">0</div></div>
            <div class="stat-card"><div class="label">📈 今日新增</div><div class="number" id="statTodayNew">0</div></div>
        </div>

        <div class="dashboard-chart">
            <h3>📈 近7天发布趋势</h3>
            <div class="trend-bars" id="trendBars"></div>
        </div>

        <div class="recent-activity">
            <h3 style="margin-bottom:10px;">🔄 最近动态</h3>
            <div id="recentActivity"><div class="activity-item">暂无动态</div></div>
        </div>
    </main>

    <script>
        const ENV_ID = 'campus-trading-d9g84nflw71c77ac3';
        const app = cloudbase.init({ env: ENV_ID, region: 'ap-shanghai' });
        const db = app.database();
        const auth = app.auth();

        // ===== 权限验证 =====
        (function checkAdmin() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) { location.href = 'adminLogin.html'; return; }
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') { location.href = 'adminLogin.html'; return; }
            document.getElementById('adminName').textContent = user.realName || user.username || '管理员';
            document.getElementById('adminAvatar').textContent = (user.realName || '管')[0];
        })();

        // ===== 退出管理（彻底退出登录） =====
        window.logoutAdmin = function() {
            if (!confirm('确定退出管理并退出登录吗？')) return;
            // 清除所有用户相关缓存
            localStorage.removeItem('currentUserId');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('userNick');
            localStorage.removeItem('userAvatar');
            localStorage.removeItem('userPhone');
            localStorage.removeItem('userAuth');
            localStorage.removeItem('lastUserId');
            // 跳转到登录页
            location.href = 'login.html';
        };

        // ===== Toast =====
        const toast = document.getElementById('toast');
        let toastTimer = null;
        function showToast(msg, duration = 2500) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ===== 加载概览数据 =====
        window.loadDashboard = async function() {
            try {
                const [userRes, wantedRes, saleRes] = await Promise.all([
                    db.collection('user').get(),
                    db.collection('wanted').get(),
                    db.collection('sales').get()
                ]);
                const users = userRes.data || [];
                const wanteds = wantedRes.data || [];
                const sales = saleRes.data || [];

                document.getElementById('statUserTotal').textContent = users.length;
                document.getElementById('statWantedTotal').textContent = wanteds.length;
                document.getElementById('statSaleTotal').textContent = sales.length;

                const today = new Date().toDateString();
                const allItems = [...wanteds, ...sales];
                const todayItems = allItems.filter(w => new Date(w.createdAt).toDateString() === today);
                document.getElementById('statTodayNew').textContent = todayItems.length;

                renderTrend(allItems);

                const recent = allItems.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,5);
                const activityDiv = document.getElementById('recentActivity');
                if (recent.length === 0) {
                    activityDiv.innerHTML = '<div class="activity-item">暂无动态</div>';
                } else {
                    let html = '';
                    recent.forEach(w => {
                        const time = w.createdAt ? new Date(w.createdAt).toLocaleString() : '未知';
                        const typeLabel = w.type === 'sale' ? '🛒出售' : '📢求购';
                        html += `<div class="activity-item">${typeLabel} ${w.userDisplay || w.user || '匿名用户'} 发布了「${w.name}」 <span class="time">${time}</span></div>`;
                    });
                    activityDiv.innerHTML = html;
                }
            } catch (e) {
                console.error('加载概览失败', e);
                showToast('⚠️ 加载概览数据失败', 2000);
            }
        };

        function renderTrend(items) {
            const container = document.getElementById('trendBars');
            const days = 7;
            const now = new Date();
            const labels = [];
            const counts = [];
            for (let i = days-1; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                const dateStr = d.toDateString();
                labels.push((d.getMonth()+1)+'/'+d.getDate());
                const count = items.filter(w => new Date(w.createdAt).toDateString() === dateStr).length;
                counts.push(count);
            }
            const max = Math.max(...counts, 1);
            let html = '';
            counts.forEach((c, idx) => {
                const height = (c / max) * 100;
                html += `
                    <div class="trend-bar">
                        <div class="bar" style="height:${height}px;"></div>
                        <div class="bar-label">${labels[idx]}</div>
                        <div style="font-size:12px;color:#3d4a5c;margin-top:2px;">${c}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        auth.signInAnonymously().catch(e => console.warn('匿名登录失败', e));
        loadDashboard();
    </script>
</body>
</html>
