<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>消息列表 - 校园旧书好物交易</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei",sans-serif;
        }
        body{
            background-color: #ffffff;
            max-width: 900px;
            margin: 30px auto;
            padding:0 20px;
        }
        .page-header{
            display:flex;
            align-items:center;
            justify-content: space-between;
            border-bottom:2px solid #222;
            padding-bottom:12px;
            margin-bottom:25px;
        }
        .page-header h1{
            font-size:42px;
            display:flex;
            align-items:center;
            gap:10px;
        }
        .btn-refresh{
            padding:8px 16px;
            border:1px solid #aaa;
            background:#f3f3f3;
            border-radius:4px;
            font-size:16px;
            cursor:pointer;
        }
        .btn-service{
            padding:9px 22px;
            border:2px solid #222;
            background:#fff;
            border-radius:4px;
            font-size:18px;
            cursor:pointer;
            font-weight:500;
        }
        .list-item{
            border:1px solid #eee;
            border-radius:8px;
            padding:16px;
            margin-bottom:14px;
            display:flex;
            gap:15px;
            align-items:flex-start;
        }
        .avatar{
            width:56px;
            height:56px;
            border-radius:50%;
            border:1px solid #ddd;
            flex-shrink:0;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
        }
        .item-info{
            flex:1;
        }
        .item-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .name{
            font-size:22px;
            font-weight:bold;
            display:flex;
            gap:8px;
            align-items:center;
        }
        .tag-official{
            background:#3688ff;
            color:white;
            font-size:13px;
            padding:3px 8px;
            border-radius:12px;
        }
        .time-text{
            color:#999;
        }
        .item-desc{
            color:#777;
            margin-top:4px;
            font-size:16px;
        }
        .bottom-buttons{
            display:flex;
            gap:20px;
            justify-content:center;
            margin-top:40px;
        }
        .bottom-btn{
            padding:10px 26px;
            border:1px solid #333;
            border-radius:4px;
            background:#fff;
            font-size:17px;
            cursor:pointer;
        }

        /* ==========人工客服弹窗样式========== */
        .service-modal{
            display:none;
            position:fixed;
            left:0;
            top:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.4);
            z-index:999;
            align-items:center;
            justify-content:center;
        }
        .chat-window{
            width:520px;
            height:620px;
            background:#fff;
            border-radius:10px;
            overflow:hidden;
            display:flex;
            flex-direction:column;
        }
        .chat-head{
            background:#222;
            color:white;
            padding:14px 18px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .close-chat{
            cursor:pointer;
            font-size:22px;
        }
        .chat-content{
            flex:1;
            padding:15px;
            overflow-y:auto;
            background:#f8f8f8;
        }
        .msg-row{
            margin-bottom:16px;
        }
        .msg-left{
            display:flex;
            gap:10px;
        }
        .msg-right{
            display:flex;
            gap:10px;
            flex-direction:row-reverse;
        }
        .msg-bubble{
            max-width:70%;
            padding:10px 14px;
            border-radius:6px;
        }
        .msg-left .msg-bubble{
            background:#fff;
            border:1px solid #ddd;
        }
        .msg-right .msg-bubble{
            background:#4096ff;
            color:white;
        }
        .chat-input-area{
            padding:12px;
            border-top:1px solid #ddd;
            display:flex;
            gap:10px;
        }
        #msg-input{
            flex:1;
            padding:10px;
            border:1px solid #ccc;
            border-radius:4px;
            font-size:15px;
        }
        .send-btn{
            padding:0 20px;
            background:#222;
            color:white;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>💬 消息</h1>
        <div style="display:flex; gap:12px; align-items:center;">
            <button class="btn-refresh">🔄 刷新</button>
            <button class="btn-service" id="openServiceBtn">🎧 人工客服</button>
        </div>
    </div>

    <!-- 消息列表 -->
    <div class="list-item">
        <div class="avatar">📢</div>
        <div class="item-info">
            <div class="item-top">
                <div class="name">官方消息通知 <span class="tag-official">官方</span></div>
                <div class="time-text">最新</div>
            </div>
            <div class="item-desc">欢迎来到校园交易平台，查看最新公告</div>
        </div>
    </div>
    <div class="list-item">
        <div class="avatar">👤</div>
        <div class="item-info">
            <div class="item-top">
                <div class="name">潘涛</div>
                <div class="time-text">2026/7/14</div>
            </div>
            <div class="item-desc">千万千万千万千万</div>
        </div>
    </div>

    <div class="bottom-buttons">
        <button class="bottom-btn">🏠 返回主界面</button>
        <button class="bottom-btn">📢 去求购广场</button>
    </div>

    <!-- =====人工客服弹窗===== -->
    <div class="service-modal" id="serviceModal">
        <div class="chat-window">
            <div class="chat-head">
                <span>校园平台人工客服</span>
                <span class="close-chat" id="closeChat">×</span>
            </div>
            <div class="chat-content" id="chatBox">
                <div class="msg-row msg-left">
                    <div class="msg-bubble">您好，请问有什么可以帮助您？</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="输入消息...">
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 获取元素
        const openBtn = document.getElementById('openServiceBtn');
        const modal = document.getElementById('serviceModal');
        const closeBtn = document.getElementById('closeChat');
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msg-input');
        const chatBox = document.getElementById('chatBox');

        // 打开客服窗口
        openBtn.addEventListener('click',()=>{
            modal.style.display = 'flex';
        })
        // 关闭窗口
        closeBtn.addEventListener('click',()=>{
            modal.style.display = 'none';
        })

        // 发送消息
        function sendMessage(){
            let text = msgInput.value.trim();
            if(text === "") return;
            // 添加用户消息
            chatBox.innerHTML += `
                <div class="msg-row msg-right">
                    <div class="msg-bubble">${text}</div>
                </div>
            `
            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // 模拟客服自动回复（你后期可以替换成后端接口/websocket）
            setTimeout(()=>{
                chatBox.innerHTML += `
                    <div class="msg-row msg-left">
                        <div class="msg-bubble">收到您的问题，我们会尽快处理，请稍等~</div>
                    </div>
                `
                chatBox.scrollTop = chatBox.scrollHeight;
            },800)
        }
        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown',e=>{
            if(e.key === 'Enter') sendMessage();
        })
    </script>
</body>
</html>
