<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理 - 校园旧书好物交易平台</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
    <style>
        /* ===== 完整样式（与 adminWanted 保持一致） ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei","PingFang SC",sans-serif; }
        body { background:#f5f7fb; display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:220px; min-width:220px; background:#fff; border-right:1px solid #e8ecf2; height:100vh; display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
        .sidebar-brand { padding:20px 24px 14px; border-bottom:1px solid #eef1f5; font-size:20px; font-weight:700; color:#1a2634; display:flex; align-items:center; gap:8px; }
        .sidebar-brand span { font-size:26px; }
        .sidebar-menu { padding:12px 0; flex:1; }
        .menu-item { display:flex; align-items:center; padding:12px 24px; cursor:pointer; color:#3d4a5c; font-size:15px; transition:0.15s; border-left:3px solid transparent; gap:12px; text-decoration:none; }
        .menu-item:hover { background:#f0f4fe; color:#1a2634; }
        .menu-item.active { background:#eef4ff; color:#407bff; border-left-color:#407bff; font-weight:500; }
        .menu-item .icon { font-size:18px; width:24px; text-align:center; }
        .admin-info { padding:16px 24px; border-top:1px solid #eef1f5; display:flex; align-items:center; gap:12px; }
        .admin-avatar { width:36px; height:36px; border-radius:50%; background:#407bff; color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; }
        .admin-name { font-size:14px; font-weight:600; color:#1a2634; }
        .admin-role { font-size:12px; color:#8895aa; }
        .logout-btn { margin:0 12px 16px; padding:8px 16px; background:#e74c5e; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:14px; transition:0.15s; text-align:center; }
        .logout-btn:hover { background:#c0392b; }

        .main-content { flex:1; padding:24px 32px 40px; overflow-y:auto; }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
        .page-header h1 { font-size:26px; font-weight:700; color:#1a2634; }

        .toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-bottom:18px; background:#fff; border-radius:12px; padding:12px 20px; border:1px solid #e8ecf2; }
        .toolbar select, .toolbar input { padding:6px 12px; border:1px solid #d0d6de; border-radius:6px; font-size:14px; background:#fafcff; outline:none; }
        .toolbar select:focus, .toolbar input:focus { border-color:#407bff; box-shadow:0 0 0 3px rgba(64,123,255,0.12); }
        .btn { padding:6px 16px; border:1px solid #d0d6de; border-radius:6px; background:#fff; cursor:pointer; font-size:14px; transition:0.15s; }
        .btn:hover { background:#f0f4fe; }
        .btn-primary { background:#407bff; color:#fff; border-color:#407bff; }
        .btn-primary:hover { background:#2563eb; }
        .btn-danger { background:#e74c5e; color:#fff; border-color:#e74c5e; }
        .btn-danger:hover { background:#d63a4c; }
        .btn-success { background:#22a67e; color:#fff; border-color:#22a67e; }
        .btn-success:hover { background:#1a8f6c; }
        .btn-sm { padding:4px 12px; font-size:13px; }
        .btn-xs { padding:2px 10px; font-size:12px; border-radius:4px; }

        .table-wrap { background:#fff; border-radius:12px; border:1px solid #e8ecf2; overflow:hidden; }
        .table-scroll { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:14px; min-width:700px; }
        thead { background:#f8fafd; border-bottom:1px solid #e2e6ec; }
        thead th { padding:12px 14px; text-align:left; font-weight:600; color:#3d4a5c; font-size:13px; white-space:nowrap; }
        tbody td { padding:12px 14px; border-bottom:1px solid #eef1f5; color:#1a2634; vertical-align:middle; }
        tbody tr:hover { background:#f8fafd; }
        .status-badge { display:inline-block; padding:2px 12px; border-radius:20px; font-size:12px; font-weight:500; }
        .status-badge.active { background:#d4edda; color:#155724; }
        .status-badge.banned { background:#f8d7da; color:#721c24; }
        .action-group { display:flex; gap:4px; flex-wrap:wrap; }

        .pagination-bar { display:flex; justify-content:space-between; align-items:center; padding:14px 20px 16px; border-top:1px solid #eef1f5; flex-wrap:wrap; gap:10px; background:#fafcff; }
        .pagination-bar .info { font-size:14px; color:#8895aa; }
        .pagination-bar .pages { display:flex; gap:4px; }
        .pagination-bar .pages button { padding:4px 12px; border:1px solid #d0d6de; border-radius:6px; background:#fff; cursor:pointer; font-size:14px; min-width:34px; height:34px; }
        .pagination-bar .pages button:hover { background:#f0f4fe; }
        .pagination-bar .pages button.active { background:#407bff; color:#fff; border-color:#407bff; }
        .pagination-bar .pages button:disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }

        .empty-state { text-align:center; padding:40px; color:#8895aa; }
        .empty-state .icon { font-size:48px; margin-bottom:8px; opacity:0.5; }

        .toast { position:fixed; top:30px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 28px; border-radius:10px; font-size:15px; z-index:1000; opacity:0; transition:opacity 0.4s; pointer-events:none; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
        .toast.show { opacity:1; }

        @media (max-width:768px) {
            .sidebar { width:60px; min-width:60px; }
            .sidebar-brand span:last-child, .menu-item .label, .admin-info .admin-name, .admin-info .admin-role { display:none; }
            .sidebar-brand { justify-content:center; padding:16px 0; }
            .menu-item { padding:12px 0; justify-content:center; }
            .admin-info { justify-content:center; }
            .main-content { padding:16px; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-brand"><span>📚</span><span>管理后台</span></div>
        <div class="sidebar-menu">
            <a class="menu-item" href="adminDashboard.html"><span class="icon">📊</span><span class="label">数据概览</span></a>
            <a class="menu-item" href="adminWanted.html"><span class="icon">📦</span><span class="label">求购贴管理</span></a>
            <a class="menu-item" href="adminSale.html"><span class="icon">🛒</span><span class="label">出售贴管理</span></a>
            <a class="menu-item" href="adminComment.html"><span class="icon">💬</span><span class="label">留言审核</span></a>
            <a class="menu-item active" href="adminUsers.html"><span class="icon">👥</span><span class="label">用户管理</span></a>
            <a class="menu-item" href="adminReports.html"><span class="icon">🚫</span><span class="label">举报管理</span></a>
        </div>
        <div class="admin-info">
            <div class="admin-avatar" id="adminAvatar">管</div>
            <div>
                <div class="admin-name" id="adminName">管理员</div>
                <div class="admin-role">超级管理员</div>
            </div>
        </div>
        <button class="logout-btn" onclick="logoutAdmin()">🚪 退出管理</button>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="page-header">
            <h1>👥 用户管理</h1>
            <button class="btn btn-sm" onclick="location.reload()">🔄 刷新</button>
        </div>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="用户名/学号..." style="width:180px;">
            <select id="statusFilter">
                <option value="all">全部状态</option>
                <option value="active">正常</option>
                <option value="banned">已封禁</option>
            </select>
            <button class="btn btn-sm" onclick="applyFilter()">🔍 搜索</button>
        </div>

        <div class="table-wrap">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th style="width:60px;">用户ID</th>
                            <th>用户名</th>
                            <th style="width:100px;">学号</th>
                            <th style="width:100px;">注册时间</th>
                            <th style="width:80px;">发布贴数</th>
                            <th style="width:80px;">账号状态</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"><tr><td colspan="7" class="empty-state"><div class="icon">👥</div><p>暂无用户</p></td></tr></tbody>
                </table>
            </div>
            <div class="pagination-bar">
                <span class="info" id="paginationInfo">共 0 条</span>
                <div class="pages" id="pagination"></div>
            </div>
        </div>
    </main>

    <script>
        const ENV_ID = 'campus-trading-d9g84nflw71c77ac3';
        const app = cloudbase.init({ env: ENV_ID, region: 'ap-shanghai' });
        const db = app.database();
        const auth = app.auth();

        // ===== 权限验证 =====
        (function checkAdmin() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) { location.href = 'adminLogin.html'; return; }
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') { location.href = 'adminLogin.html'; return; }
            document.getElementById('adminName').textContent = user.realName || user.username || '管理员';
            document.getElementById('adminAvatar').textContent = (user.realName || '管')[0];
        })();

        // ===== 退出管理 =====
        window.logoutAdmin = function() {
            if (!confirm('确定退出管理模式吗？')) return;
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            user.role = 'user';
            localStorage.setItem('currentUser', JSON.stringify(user));
            location.href = 'setting.html';
        };

        // ===== Toast =====
        const toast = document.getElementById('toast');
        let toastTimer = null;
        function showToast(msg, duration = 2500) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ===== 工具函数 =====
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(ts) {
            if (!ts) return '-';
            const d = new Date(ts);
            return d.toLocaleString('zh-CN', { hour12: false });
        }

        function renderPagination(container, current, total, onChange) {
            if (total <= 1) { container.innerHTML = ''; return; }
            let html = '';
            html += `<button ${current <= 1 ? 'disabled' : ''} data-page="${current-1}">‹</button>`;
            let startPage = Math.max(1, current - 2);
            let endPage = Math.min(total, current + 2);
            if (endPage - startPage < 4) {
                if (startPage > 1) startPage = Math.max(1, endPage - 4);
                if (endPage < total) endPage = Math.min(total, startPage + 4);
            }
            if (startPage > 1) { html += `<button data-page="1">1</button>`; if (startPage > 2) html += `<button disabled>…</button>`; }
            for (let i = startPage; i <= endPage; i++) {
                html += `<button data-page="${i}" class="${i === current ? 'active' : ''}">${i}</button>`;
            }
            if (endPage < total) { if (endPage < total - 1) html += `<button disabled>…</button>`; html += `<button data-page="${total}">${total}</button>`; }
            html += `<button ${current >= total ? 'disabled' : ''} data-page="${current+1}">›</button>`;
            container.innerHTML = html;
            container.querySelectorAll('button[data-page]').forEach(btn => {
                btn.onclick = function() {
                    const page = parseInt(this.dataset.page);
                    if (!isNaN(page) && page !== current) onChange(page);
                };
            });
        }

        // ===== 数据状态 =====
        let allItems = [], filteredItems = [], currentPage = 1, pageSize = 8;

        // ===== 加载数据 =====
        async function loadData() {
            try {
                const [userRes, wantedAll, saleAll] = await Promise.all([
                    db.collection('user').orderBy('createdAt', 'desc').get(),
                    db.collection('wanted').get(),
                    db.collection('sales').get()
                ]);
                allItems = userRes.data || [];
                const wantedMap = {};
                (wantedAll.data || []).forEach(w => {
                    const uid = w.user;
                    if (uid) wantedMap[uid] = (wantedMap[uid] || 0) + 1;
                });
                (saleAll.data || []).forEach(s => {
                    const uid = s.user;
                    if (uid) wantedMap[uid] = (wantedMap[uid] || 0) + 1;
                });
                allItems.forEach(u => {
                    u.postCount = wantedMap[u._id] || 0;
                    if (!u.status) u.status = 'active';
                });
                if (allItems.length === 0) {
                    showToast('⚠️ 未加载到任何用户', 2000);
                }
                applyFilter();
            } catch (e) {
                console.error('加载失败', e);
                showToast('❌ 加载失败：' + e.message, 3000);
                allItems = [];
                renderTable([]);
            }
        }

        // ===== 筛选 =====
        window.applyFilter = function() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const status = document.getElementById('statusFilter').value;
            let list = allItems;
            if (keyword) {
                list = list.filter(item => (item.username || '').toLowerCase().includes(keyword) || (item.realName || '').toLowerCase().includes(keyword) || (item.studentId || '').toLowerCase().includes(keyword));
            }
            if (status !== 'all') {
                list = list.filter(item => item.status === status);
            }
            filteredItems = list;
            currentPage = 1;
            renderTable(filteredItems);
        };

        // ===== 渲染表格 =====
        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            const info = document.getElementById('paginationInfo');
            const pages = document.getElementById('pagination');

            const total = list.length;
            const totalPages = Math.ceil(total / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * pageSize;
            const end = Math.min(start + pageSize, total);
            const pageItems = list.slice(start, end);

            info.textContent = `共 ${total} 条`;

            if (total === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><div class="icon">👥</div><p>暂无用户</p></td></tr>`;
                pages.innerHTML = '';
                return;
            }

            let html = '';
            pageItems.forEach((item, idx) => {
                const realIdx = start + idx + 1;
                const uid = 'U' + String(realIdx).padStart(3, '0');
                const status = item.status || 'active';
                const statusLabel = status === 'active' ? '正常' : '已封禁';
                const statusClass = status === 'active' ? 'active' : 'banned';

                html += `
                    <tr>
                        <td><strong>${uid}</strong></td>
                        <td>${escapeHtml(item.username || '')}</td>
                        <td>${escapeHtml(item.studentId || '-')}</td>
                        <td>${formatTime(item.createdAt)}</td>
                        <td>${item.postCount}</td>
                        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                        <td>
                            <div class="action-group">
                                <button class="btn btn-xs btn-primary" onclick="viewUser('${item._id}')">查看</button>
                                ${status === 'active' ? `<button class="btn btn-xs btn-danger" onclick="banUser('${item._id}')">封禁</button>` : `<button class="btn btn-xs btn-success" onclick="unbanUser('${item._id}')">解封</button>`}
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
            renderPagination(pages, currentPage, totalPages, (page) => {
                currentPage = page;
                renderTable(filteredItems);
            });
        }

        // ===== 操作 =====
        window.viewUser = function(id) {
            alert('👤 用户详情（开发中）');
        };

        window.banUser = async function(id) {
            if (!confirm('确定封禁该用户？')) return;
            try {
                await db.collection('user').doc(id).update({ status: 'banned' });
                showToast('✅ 已封禁', 1500);
                loadData();
            } catch (e) { showToast('❌ 操作失败：' + e.message, 4000); }
        };

        window.unbanUser = async function(id) {
            if (!confirm('确定解封该用户？')) return;
            try {
                await db.collection('user').doc(id).update({ status: 'active' });
                showToast('✅ 已解封', 1500);
                loadData();
            } catch (e) { showToast('❌ 操作失败：' + e.message, 4000); }
        };

        // ===== 搜索回车 =====
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') applyFilter();
        });

        // ===== 初始化 =====
        auth.signInAnonymously().catch(e => console.warn('匿名登录失败', e));
        loadData();
    </script>
</body>
</html>
